*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#F7F4F0;color:#1A1410;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#7A4E3E;padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:54px;flex-shrink:0}
.logo{color:#fff;font-size:15px;font-weight:600}
.logo span{opacity:.6;font-weight:400;font-size:13px;margin-left:8px}
.tprog{display:flex;align-items:center;gap:8px;margin-left:auto}
.tprog-bar{width:100px;height:4px;border-radius:2px;background:rgba(255,255,255,.25);overflow:hidden}
.tprog-fill{height:100%;border-radius:2px;background:#fff;transition:width .3s}
.tprog-lbl{color:rgba(255,255,255,.85);font-size:12px;min-width:28px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4E9462;margin-left:8px;transition:background .3s}
.sync-dot.syncing{background:#E8A04A;animation:pulse .8s infinite}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;flex-shrink:0;background:#fff;border-right:1px solid #E8E0D8;overflow-y:auto}
.sidebar-hdr{font-size:10px;font-weight:600;color:#9E9188;text-transform:uppercase;letter-spacing:.8px;padding:14px 16px 8px}
.pbtn{width:100%;text-align:left;padding:9px 16px;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:9px;transition:background .1s}
.pbtn:hover{background:#F7F4F0}
.pbtn.active{background:#FEF3E8;border-left:3px solid #C8956C}
.pbtn.active .pnum{background:#C8956C;color:#fff}
.pnum{width:22px;height:22px;border-radius:50%;background:#F0EBE4;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#7A5040;flex-shrink:0}
.pinfo{flex:1;min-width:0}
.pname{font-size:12.5px;font-weight:500;color:#1A1410;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdays{font-size:11px;color:#9E9188;margin-top:1px}
.ppct{font-size:11px;color:#9E9188;flex-shrink:0}

.phbar-row{display:flex;align-items:center;gap:.75rem}

.phfill{height:100%;border-radius:3px;background:#4E9462;transition:width .3s}
.phlbl{font-size:12.5px;color:#6B5F52;font-weight:500;min-width:36px;text-align:right}

.tmain{display:flex;align-items:flex-start;gap:9px}

.stat{background:#F7F4F0;border-radius:8px;padding:10px 14px}
.snum{font-size:22px;font-weight:600;color:#1A1410}

.toast{position:fixed;bottom:20px;right:20px;background:#4E9462;color:#fff;font-size:13px;padding:8px 16px;border-radius:6px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;display:flex;align-items:center;gap:6px}

.loading{display:flex;align-items:center;justify-content:center;height:200px;color:#9E9188;font-size:14px;gap:10px}

@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:620px){.sidebar{display:none}.statsbar{grid-template-columns:repeat(2,1fr)}}

var sb = {
  headers: {
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal'
  },
  url: SB_URL + '/rest/v1/tracker_state',

  async getAll() {
    var r = await fetch(this.url + '?select=id,value', {headers: this.headers});
    if (!r.ok) throw new Error('fetch error ' + r.status);
    return r.json();
  },

  async upsert(id, value) {
    var r = await fetch(this.url, {
      method: 'POST',
      headers: Object.assign({}, this.headers, {'Prefer': 'resolution=merge-duplicates,return=minimal'}),
      body: JSON.stringify({id: id, value: value, updated_at: new Date().toISOString()})
    });
    if (!r.ok) throw new Error('upsert error ' + r.status);
  },

  subscribe(callback) {
    // Realtime через Supabase WebSocket
    var wsUrl = SB_URL.replace('https://', 'wss://') + '/realtime/v1/websocket?apikey=' + SB_KEY + '&vsn=1.0.0';
    var ws = new WebSocket(wsUrl);
    ws.onopen = function() {
      ws.send(JSON.stringify({topic:'realtime:public:tracker_state', event:'phx_join', payload:{}, ref:'1'}));
    };
    ws.onmessage = function(e) {
      try {
        var msg = JSON.parse(e.data);
        if (msg.event === 'INSERT' || msg.event === 'UPDATE') {
          var rec = msg.payload && msg.payload.record;
          if (rec) callback(rec.id, rec.value);
        }
      } catch(err) {}
    };
    ws.onerror = function() { console.log('WS error'); };
    return ws;
  }
};

// ── STATE ────────────────────────────────────────────────────────────────────
var state = {};
var openB = {};
var cur = 0;
PHASES.forEach(function(p){ p.blocks.forEach(function(b){ openB[b.id] = true; }); });

// ── SYNC STATUS ──────────────────────────────────────────────────────────────
function setSyncStatus(s) {
  var d = document.getElementById('sync-dot');
  if (!d) return;
  d.className = 'sync-dot' + (s === 'syncing' ? ' syncing' : s === 'error' ? ' error' : '');
  d.title = s === 'ok' ? 'Синхронизировано' : s === 'syncing' ? 'Сохранение...' : 'Ошибка синхронизации';
}

// ── LOAD FROM SUPABASE ───────────────────────────────────────────────────────
async function loadState() {
  try {
    setSyncStatus('syncing');
    var rows = await sb.getAll();
    rows.forEach(function(r){ state[r.id] = r.value; });
    setSyncStatus('ok');
  } catch(e) {
    console.error('Load error:', e);
    setSyncStatus('error');
    // fallback to localStorage
    try { var ls = localStorage.getItem('ct_fallback'); if(ls) state = JSON.parse(ls); } catch(e2){}
  }
}

// ── SAVE TO SUPABASE ─────────────────────────────────────────────────────────
var saveQueue = {};
var saveTimer = null;

function scheduleSave(id, value) {
  saveQueue[id] = value;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 400);
}

async function flushSave() {
  var queue = saveQueue;
  saveQueue = {};
  setSyncStatus('syncing');
  var ids = Object.keys(queue);
  try {
    for (var i = 0; i < ids.length; i++) {
      await sb.upsert(ids[i], queue[ids[i]]);
    }
    setSyncStatus('ok');
    showToast();
    // fallback backup
    try { localStorage.setItem('ct_fallback', JSON.stringify(state)); } catch(e){}
  } catch(e) {
    console.error('Save error:', e);
    setSyncStatus('error');
  }
}

function showToast() {
  var t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, 1800);
}

// ── REALTIME ─────────────────────────────────────────────────────────────────
function startRealtime() {
  try {
    sb.subscribe(function(id, value) {
      if (state[id] !== value) {
        state[id] = value;
        renderSidebar();
        renderTop();
        renderStats();
        renderContent();
      }
    });
  } catch(e) {
    console.log('Realtime not available, polling instead');
    // Fallback: poll every 15 sec
    setInterval(async function() {
      try {
        var rows = await sb.getAll();
        var changed = false;
        rows.forEach(function(r){ if(state[r.id] !== r.value){ state[r.id] = r.value; changed = true; } });
        if (changed) { renderSidebar(); renderTop(); renderStats(); renderContent(); }
      } catch(e2) {}
    }, 15000);
  }
}

// ── STATS ────────────────────────────────────────────────────────────────────
function pStats(p){
  var tot=0,don=0;
  p.blocks.forEach(function(b){ b.tasks.forEach(function(t){ tot++; if(state[t.id]==='true') don++; }); });
  return{tot:tot,don:don};
}
function allStats(){
  var tot=0,don=0;
  PHASES.forEach(function(p){ var s=pStats(p); tot+=s.tot; don+=s.don; });
  return{tot:tot,don:don};
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderSidebar(){
  var html='';
  PHASES.forEach(function(p,i){
    var s=pStats(p);
    var pct=s.tot?Math.round(s.don/s.tot*100):0;
    html+='<button class="pbtn'+(i===cur?' active':'')+'" onclick="go('+i+')">';
    html+='<div class="pnum">'+(i+1)+'</div>';
    html+='<div class="pinfo"><div class="pname">'+p.label+'</div><div class="pdays">'+p.days+'</div></div>';
    html+='<div class="ppct">'+pct+'%</div></button>';
    html+='<div class="pminibar"><div class="pminifill" style="width:'+pct+'%"></div></div>';
  });
  document.getElementById('sidebar').innerHTML=html;
}

function renderTop(){
  var s=allStats();
  var pct=s.tot?Math.round(s.don/s.tot*100):0;
  document.getElementById('tfill').style.width=pct+'%';
  document.getElementById('tpct').textContent=pct+'%';
}

function renderStats(){
  var s=allStats();
  var pct=s.tot?Math.round(s.don/s.tot*100):0;
  document.getElementById('statsbar').innerHTML=
    '<div class="stat"><div class="snum">'+PHASES.length+'</div><div class="slbl">этапов</div></div>'+
    '<div class="stat"><div class="snum">'+s.tot+'</div><div class="slbl">задач всего</div></div>'+
    '<div class="stat"><div class="snum">'+s.don+'</div><div class="slbl">выполнено</div></div>'+
    '<div class="stat"><div class="snum">'+pct+'%</div><div class="slbl">прогресс</div></div>';
}

function renderContent(){
  var p=PHASES[cur];
  var s=pStats(p);
  var pct=s.tot?Math.round(s.don/s.tot*100):0;
  var html='<div class="ph">';
  html+='<div class="ph-top"><div class="ph-title">Этап '+(cur+1)+'. '+p.label+'</div>';
  html+='<div class="ph-badge">'+p.days+'</div></div>';
  html+='<div class="ph-desc">'+p.desc+'</div>';
  html+='<div class="team-lbl">Участники этапа</div><div class="chips">';
  p.team.forEach(function(m,i){ html+='<span class="chip'+(i===0?' lead':'')+'">'+m+'</span>'; });
  html+='</div>';
  html+='<div class="phbar-row"><div class="phbar"><div class="phfill" style="width:'+pct+'%"></div></div>';
  html+='<div class="phlbl">'+s.don+'/'+s.tot+'</div></div></div>';

  p.blocks.forEach(function(b){
    var bdone=b.tasks.filter(function(t){ return state[t.id]==='true'; }).length;
    var isOpen=openB[b.id];
    html+='<div class="block"><div class="bhdr" onclick="toggleB(\''+b.id+'\')">';
    html+='<div class="bdot" style="background:'+b.color+'"></div>';
    html+='<div class="bname">'+b.label+'</div>';
    html+='<div class="bcnt">'+bdone+'/'+b.tasks.length+'</div>';
    html+='<div class="bchev'+(isOpen?' open':'')+'">&#8964;</div></div>';
    if(isOpen){
      html+='<div class="bbody">';
      b.tasks.forEach(function(t){
        var done=state[t.id]==='true';
        var hasCom=!!(state['c_'+t.id]);
        var showCom=!!(state['oc_'+t.id]);
        var cv=(state['c_'+t.id]||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        html+='<div class="task"><div class="tmain">';
        html+='<div class="cb'+(done?' done':'')+'" onclick="toggleT(\''+t.id+'\')"></div>';
        html+='<div class="tbody"><div class="ttext'+(done?' done':'")>'+t.text+'</div>';
        if(t.detail) html+='<div class="tdetail">'+t.detail+'</div>';
        html+='</div></div>';
        html+='<div class="tfooter"><button class="cbtn'+(hasCom?' has':'')+'" onclick="toggleC(\''+t.id+'\')">&#128172; '+(hasCom?'комментарий':'добавить комментарий')+'</button></div>';
        if(showCom||hasCom) html+='<div class="cwrap"><textarea placeholder="Комментарий..." onchange="saveC(\''+t.id+'\',this.value)">'+cv+'</textarea></div>';
        html+='</div>';
      });
      html+='</div>';
    }
    html+='</div>';
  });
  document.getElementById('content').innerHTML=html;
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function go(i){ cur=i; renderSidebar(); renderContent(); }
function toggleB(id){ openB[id]=!openB[id]; renderContent(); }

function toggleT(id){
  state[id] = state[id]==='true' ? 'false' : 'true';
  scheduleSave(id, state[id]);
  renderSidebar(); renderTop(); renderStats(); renderContent();
}

function toggleC(id){
  state['oc_'+id] = state['oc_'+id] ? '' : 'true';
  renderContent();
}

function saveC(id,val){
  state['c_'+id]=val;
  scheduleSave('c_'+id, val);
  renderSidebar(); renderContent();
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  await loadState();
  startRealtime();
  renderSidebar();
  renderTop();
  renderStats();
  renderContent();
}

init();
</script>
</body>
</html>
